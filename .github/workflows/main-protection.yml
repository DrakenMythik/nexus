name: "GNAP Pipeline: Verification"

on:
  pull_request:
    branches: [ "main" ]

jobs:
  verify-agent-code:
    runs-on: ubuntu-latest
    env:
      # Placeholder values for stubbed Cypress auth tests (see cypress/e2e/auth.cy.ts).
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e2e-ci-placeholder.e2e-ci-placeholder
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Lint agent context (ctxlint)
        run: npm run lint:ctx

      - name: Build the app
        run: npm run build

      - name: Run Cypress Tests
        run: npm run test:e2e:ci